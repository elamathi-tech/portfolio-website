<!DOCTYPE html>
<html>

<head>
  <title>
    Contact Form
  </title>
 
  <link rel="stylesheet" href="style.css/contact-form.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">

</head>

<body>
  <div class="container">
  <div class="head-section">
    <h1 class="head-section__name">Elamathi R</h1>
    <p class="head-section__role">Web Developer</p>
    <a class="head-section__home" href="index.html" target="_blank">Home</a>
  </div>

  <div class="middle-section">
    <form>
      <table>
        <tr>
          <td>Name:</td>
          <td><input class="middle-section__input" type="text" placeholder="Enter your name"></td>
        </tr>
        <tr>
          <td>Email:</td>
          <td><input class="middle-section__input" type="email" placeholder="Enter your email"></td>
        </tr>
        <tr>
          <td>Message:</td>
          <td>
            <textarea class="middle-section__message" placeholder="Your message"></textarea>
          </td>
        </tr>
        <tr>
          <td></td>
          <td><input class="middle-section__submit" type="Submit"></td>
        </tr>
      </table>
    </form>
  </div>

  <div class="end-section">
    <p class="end-section__title">Social Media:
      <a href="https://github.com/elamathi-tech" target="_blank">GitHub</a>,
      <a href="https://www.linkedin.com/in/r-elamathi/" target="_blank">LinkedIn</a>
    </p>
    <p class="end-section__description">&copy; Elamathi R</p>
  </div>
  </div>

</body>

</html>
